name: Vision Vdoo Direct Scan
on: [push]

jobs:
  # Job 1: Download the binary and ZIP it
  download-and-zip:
    runs-on: ubuntu-latest
    steps:
      - name: Download Busybox Binary
        run: |
          # Download the standard binary
          curl -Lo https://busybox.net/downloads/binaries/1.16.1/busybox-x86_64
          chmod +x busybox

      - name: Wrap in a Zip (to provide a 'filesystem')
        run: |
          # Vision Vdoo needs a container/filesystem. Zipping it solves this.
          zip -r briangriffin.zip busybox

      - name: Upload Zip for Scan
        uses: actions/upload-artifact@v4
        with:
          name: package_to_scan
          path: my_firmware_package.zip

  # Job 2: Run the scan inside the Vdoo container
  vision-scan:
    needs: download-and-zip
    runs-on: ubuntu-latest
    container:
      image: releases-docker.jfrog.io/vision_analysis:5.29.1

    steps:
      - name: Download Zip from previous job
        uses: actions/download-artifact@v4
        with:
          name: package_to_scan

      - name: Run Vision Analysis
        shell: bash
        run: |
          # We scan the .zip file instead of the raw binary
          # This satisfies the 'Filesystem' requirement of the Vdoo engine
          vdoo_analysis analyze \
            --token ${{ secrets.VISION_TOKEN }} \
            --base_url ${{ vars.VISION_BASE_URL }} \
            --artifact-id ${{ vars.VISION_ARTIFACT_ID }} \
            --image-path my_firmware_package.zip \
            -n "Zipped-Binary-Scan-${{ github.run_id }}" \
            --verbose \
            --output-uuid scan_uuid.txt

          echo "Success! The scan has started. Check your Vision Vdoo dashboard."
